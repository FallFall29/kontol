<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRIS Payment - Fall Shop</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card {
  background:#fff;
  width:350px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2a5298;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:#1e3c72;
}

#qrBox {
  margin-top:20px;
  display:none;
}

#qrImage {
  width:220px;
}

.status {
  margin-top:10px;
  font-weight:bold;
}

.pending { color:orange; }
.success { color:green; }
</style>
</head>
<body>

<div class="card">
  <h2>💳 QRIS Payment</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="number" id="amount" placeholder="Nominal (contoh: 10000)">
  <button onclick="createQR()">Buat QR</button>

  <div id="qrBox">
    <img id="qrImage">
    <div id="status" class="status pending">Status: PENDING</div>
    <div id="timer"></div>
  </div>
</div>

<script>
let currentRRN = null
let countdown = 60

async function createQR() {
  const username = document.getElementById("username").value
  const amount = document.getElementById("amount").value

  if (!username || !amount) {
    alert("Lengkapi data dulu")
    return
  }

  const res = await fetch("/api/create", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, amount })
  })

  const data = await res.json()

  if (data.qr) {
    document.getElementById("qrImage").src = data.qr
    document.getElementById("qrBox").style.display = "block"
    document.getElementById("status").innerText = "Status: PENDING"
    document.getElementById("status").className = "status pending"
    currentRRN = data.rrn
    startCountdown()
    checkStatus()
  }
}

function startCountdown() {
  countdown = 60
  const timer = document.getElementById("timer")

  const interval = setInterval(() => {
    countdown--
    timer.innerText = "Cek ulang dalam " + countdown + " detik"

    if (countdown <= 0) {
      clearInterval(interval)
    }
  }, 1000)
}

async function checkStatus() {
  if (!currentRRN) return

  try {
    const res = await fetch("/api/status/" + currentRRN)
    const data = await res.json()

    if (data && data.status === "SUCCESS") {
      document.getElementById("status").innerText = "Status: SUCCESS ✅"
      document.getElementById("status").className = "status success"
      alert("Pembayaran Berhasil ✅")
    } else {
      startCountdown()
      setTimeout(checkStatus, 60000)
    }

  } catch (err) {
    console.log("Error cek status:", err)
    setTimeout(checkStatus, 60000)
  }
}
</script>

</body>
</html>
